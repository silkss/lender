<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1>Список всех заявок</h1>
    <table>
        <tr>
            <th>ID</th>
            <th>СТАТУС</th>
        </tr>
        <tr th:each="loanRequest : ${loanRequests}">
            <td th:text="${loanRequest.id}"/>
            <td th:text="${loanRequest.status}"/>
        </tr>
    </table>
</body>
</html>
